<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Would You Rather? — a whimsical dilemma generator</title>
<meta name="description" content="Press the button. Get whimsically stuck between two impossible, weirdly-linked options.">
<style>
  :root{

    --accent2:#8b5cf6;

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}

    min-height:100vh;
    font-family:"Segoe UI", system-ui, -apple-system, Helvetica, Arial, sans-serif;
    color:var(--ink);

      radial-gradient(circle at 18% 8%, rgba(139,92,246,.22), transparent 42%),
      radial-gradient(circle at 85% 22%, rgba(255,180,84,.10), transparent 38%),
      linear-gradient(165deg,var(--bg1),var(--bg2) 55%,var(--bg3));

    animation:drift 22s ease-in-out infinite;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:14px 16px 20px;
    position:relative;
    overflow-x:hidden;
  }
  @keyframes drift{
    0%{background-position:0% 100%, 0% 30%, 100% 20%, 0% 30%;}
    50%{background-position:0% 100%, 100% 70%, 0% 60%, 100% 70%;}
    100%{background-position:0% 100%, 0% 30%, 100% 20%, 0% 30%;}
  }

  .sparkle{
    position:fixed;
    font-size:20px;
    opacity:.5;
    pointer-events:none;
    animation:embers 10s ease-in-out infinite;
    filter:drop-shadow(0 0 8px rgba(255,138,61,.35));
  }
  @keyframes embers{
    0%{transform:translateY(0) translateX(0) rotate(0deg);opacity:0;}
    12%{opacity:.55;}
    50%{transform:translateY(-34px) translateX(8px) rotate(10deg);}
    88%{opacity:.4;}
    100%{transform:translateY(-64px) translateX(-6px) rotate(-8deg);opacity:0;}
  }

  header{
    text-align:center;
    max-width:640px;
    z-index:1;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-size:clamp(1.5rem,5vw,2.1rem);
    margin:2px 0 2px;
    letter-spacing:.5px;
    background:linear-gradient(135deg,#ffd27a,var(--ember) 55%,var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    text-shadow:0 0 34px rgba(255,138,61,.25);
  }
  h1 .q{
    display:inline-block;
    animation:flicker 3s ease-in-out infinite;
    filter:drop-shadow(0 0 10px rgba(255,138,61,.55));
  }
  @keyframes flicker{
    0%,100%{transform:scale(1) rotate(0deg);opacity:1;}
    45%{transform:scale(1.08) rotate(-4deg);opacity:.92;}
    75%{transform:scale(.97) rotate(4deg);opacity:1;}
  }
  .tagline{
    margin:0 0 12px;
    font-size:.92rem;
    color:var(--muted);
  }

  .roll-btn{
    font-family:inherit;
    font-weight:700;
    font-size:1.15rem;
    color:#1b0b2e;
    background:linear-gradient(135deg,#ffd27a,var(--accent) 45%,var(--ember) 100%);
    border:none;
    border-radius:999px;
    padding:14px 36px;
    cursor:pointer;
    transition:transform .15s ease, box-shadow .15s ease;
    z-index:1;
    position:relative;
    box-shadow:0 0 0 rgba(255,138,61,0);
    animation:pulseGlow 2.6s ease-in-out infinite;
  }
  @keyframes pulseGlow{
    0%,100%{box-shadow:0 16px 34px rgba(0,0,0,.5), 0 0 24px rgba(255,138,61,.35);}
    50%{box-shadow:0 16px 40px rgba(0,0,0,.55), 0 0 44px rgba(255,138,61,.6);}
  }
  .roll-btn:hover{transform:translateY(-2px) scale(1.02);}
  .roll-btn:active{transform:translateY(1px) scale(.98);}
  .roll-btn:disabled{opacity:.7;cursor:default;transform:none;}

  .controls{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    justify-content:center;
    margin:12px 0;
    z-index:1;
  }

  select, .icon-btn{
    font-family:inherit;
    font-size:.88rem;
    border:1px solid var(--card-border);
    border-radius:999px;
    padding:7px 14px;
    background:var(--card);
    backdrop-filter:blur(6px);
    box-shadow:var(--shadow);
    cursor:pointer;
    color:var(--ink);
  }
  select option{color:#1b0b2e;}
  .icon-btn{
    padding:7px 10px;
    font-size:.95rem;
    line-height:1;
  }
  .icon-btn[aria-pressed="true"]{
    background:linear-gradient(135deg,var(--accent),var(--ember));
    color:#1b0b2e;
    border-color:transparent;
  }

  main{
    width:100%;
    max-width:760px;
    z-index:1;
    margin-top:0;
  }

  .theme-chip{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin:0 auto 8px;
    background:var(--card);
    border:1px solid var(--card-border);
    box-shadow:var(--shadow);
    border-radius:999px;
    padding:4px 14px;
    font-size:.78rem;
    font-weight:600;
    color:var(--accent);
    opacity:0;
    transition:opacity .3s ease;
  }
  .theme-chip.show{opacity:1;}
  .chip-wrap{display:flex;justify-content:center;}

  .dilemma{
    display:flex;
    align-items:stretch;
    gap:0;
    position:relative;
  }
  @media (max-width:640px){
    .dilemma{flex-direction:column;gap:10px;}
  }

  .option{
    flex:1;
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,.025) 0 2px, transparent 2px 16px),

    padding:16px 18px;
    box-shadow:var(--shadow);
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:1rem;
    font-weight:600;
    line-height:1.35;
    color:var(--ink);
    cursor:pointer;
    border:3px solid var(--card-border);
    transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    min-height:88px;
    opacity:0;
    transform:translateY(14px) scale(.98);

  .option.reveal{
    opacity:1;
    transform:translateY(0) scale(1);
  }
  .option:hover{transform:translateY(-3px); border-color:rgba(255,180,84,.55);}
  .option.picked{
    border-color:var(--accent);
    box-shadow:var(--shadow), 0 0 26px rgba(255,180,84,.4);
    background:
      repeating-linear-gradient(135deg, rgba(255,255,255,.03) 0 2px, transparent 2px 16px),
      linear-gradient(160deg, rgba(70,32,20,.85), rgba(30,12,42,.9));
  }
  .option.faded{opacity:.45 !important;}
  .option .label{
    position:absolute;
    top:10px;
    left:14px;
    font-size:.7rem;
    font-weight:800;
    letter-spacing:1px;
    color:var(--accent2);
    opacity:.85;
  }
  .option{position:relative;}
  .pick-tag{
    display:block;
    margin-top:10px;
    font-size:.72rem;
    font-weight:700;
    color:var(--accent);
    letter-spacing:.4px;
  }

  .or-divider{
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:800;
    font-size:.8rem;
    color:#1b0b2e;
    background:linear-gradient(135deg,#ffd27a,var(--accent));
    width:36px;
    height:36px;
    border-radius:50%;
    margin:auto -18px;
    z-index:2;
    box-shadow:var(--shadow), 0 0 18px rgba(255,180,84,.5);
    flex-shrink:0;
  }
  @media (max-width:640px){
    .or-divider{margin:-19px auto;}
  }

  .placeholder{
    text-align:center;
    color:var(--muted);
    padding:20px 20px;
    font-size:.95rem;
  }

  .history-nav{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:16px;
    margin-top:10px;
    opacity:0;
    transition:opacity .3s ease;
  }
  .history-nav.show{opacity:1;}
  .history-nav button{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:50%;
    width:38px;
    height:38px;
    box-shadow:var(--shadow);
    cursor:pointer;
    font-size:1rem;
    color:var(--ink);
  }
  .history-nav button:disabled{opacity:.35;cursor:default;}
  .history-nav .pos{font-size:.85rem;color:var(--muted);}

  footer{
    margin-top:16px;
    font-size:.68rem;
    color:var(--muted);
    opacity:.7;
    text-align:center;
    z-index:1;
  }
</style>
</head>
<body>

<header>
  <h1><span class="q">🐉</span> Would You Rather?</h1>
  <p class="tagline">Press the button. Get whimsically stuck between two impossible, weirdly-linked options.</p>
</header>

<button class="roll-btn" id="rollBtn">🔥 Give Me a Dilemma</button>

<div class="controls">
  <select id="themeSelect" aria-label="Category">
    <option value="">🎲 Any category</option>
  </select>
  <button class="icon-btn" id="voiceToggle" title="Read dilemmas aloud" aria-pressed="false">🔊</button>
  <select id="voicePicker" aria-label="Voice" hidden>
    <option value="">Default voice</option>
  </select>
</div>

<main>
  <div class="chip-wrap"><div class="theme-chip" id="themeChip"></div></div>
  <div class="dilemma" id="dilemma">
    <div class="placeholder">Your first impossible choice is one press away.</div>
  </div>
  <div class="history-nav" id="historyNav">
    <button id="prevBtn" title="Previous dilemma">◀</button>
    <span class="pos" id="historyPos"></span>
    <button id="nextBtn" title="Next dilemma">▶</button>
  </div>
</main>

<footer>Self-contained, no build step, no server.</footer>

  const SPARKLES = ['🔥','🐉','🔮','⚡','🦇','🌙','⭐','🕯️'];
  const sparkleWrap = document.body;
  for(let i=0;i<10;i++){
    const s = document.createElement('div');
    s.className='sparkle';
    s.textContent = SPARKLES[Math.floor(Math.random()*SPARKLES.length)];
    s.style.left = Math.random()*100+'vw';
    s.style.top = Math.random()*100+'vh';
    s.style.animationDelay = (Math.random()*9)+'s';
    s.style.animationDuration = (7+Math.random()*6)+'s';
    sparkleWrap.appendChild(s);
  }

  const themeSelect = document.getElementById('themeSelect');
  THEMES.forEach(t=>{
    const opt = document.createElement('option');
    opt.value = t.id;
    opt.textContent = `${t.emoji} ${t.label}`;
    themeSelect.appendChild(opt);
  });

  const rollBtn = document.getElementById('rollBtn');
  const dilemmaEl = document.getElementById('dilemma');
  const themeChip = document.getElementById('themeChip');
  const historyNav = document.getElementById('historyNav');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const historyPos = document.getElementById('historyPos');
  const voiceToggle = document.getElementById('voiceToggle');
  const voicePicker = document.getElementById('voicePicker');

  const history = [];
  let cursor = -1;
  let voiceOn = false;
  let chosenVoiceName = localStorage.getItem('wyr-voice') || '';

  // Every item shown this session, in EITHER field A or field B (cleared on
  // page reload) — an item counts as used no matter which side it appeared
  // on, so the same line never resurfaces in a different pairing either.
  const seenItems = new Set();
  let lastPickedKey = null;

  function pairKey(themeId, i, j){
    const lo = Math.min(i,j), hi = Math.max(i,j);
    return themeId+'|'+lo+'|'+hi;
  }

  function eligibleThemesFor(pool){
    const list = [];
    pool.forEach(theme=>{
      const n = theme.items.length;
      const unused = [];
      for(let i=0;i<n;i++){
        if(!seenItems.has(theme.id+'|'+i)) unused.push(i);
      }
      if(unused.length >= 2) list.push({ theme, unused });
    });
    return list;
  }

  function pickDilemma(){
    const chosenId = themeSelect.value;
    const pool = chosenId ? THEMES.filter(t=>t.id===chosenId) : THEMES;

    let eligible = eligibleThemesFor(pool);
    if(!eligible.length){
      // every item in this filter has been used this session — start a fresh lap
      pool.forEach(theme=>{
        const n = theme.items.length;
        for(let i=0;i<n;i++) seenItems.delete(theme.id+'|'+i);
      });
      eligible = eligibleThemesFor(pool);
    }

    const { theme, unused } = eligible[Math.floor(Math.random()*eligible.length)];

    let i, j, key, attempts = 0;
    do{
      const idx1 = Math.floor(Math.random()*unused.length);
      let idx2 = Math.floor(Math.random()*unused.length);
      while(idx2===idx1) idx2 = Math.floor(Math.random()*unused.length);
      i = unused[idx1];
      j = unused[idx2];
      key = pairKey(theme.id, i, j);
      attempts++;
    } while(key===lastPickedKey && unused.length>2 && attempts<10);

    seenItems.add(theme.id+'|'+i);
    seenItems.add(theme.id+'|'+j);
    lastPickedKey = key;

    const swap = Math.random() < 0.5;
    const a = swap ? j : i;
    const b = swap ? i : j;
    return { theme, a: theme.items[a], b: theme.items[b], picked:null };
  }

  function render(entry){
    themeChip.textContent = `${entry.theme.emoji} ${entry.theme.label}`;
    themeChip.classList.add('show');

    dilemmaEl.innerHTML = `
      <div class="option" id="optA"><span class="label">A</span>${cap(entry.a)}<span class="pick-tag" id="tagA"></span></div>
      <div class="or-divider">OR</div>
      <div class="option" id="optB"><span class="label">B</span>${cap(entry.b)}<span class="pick-tag" id="tagB"></span></div>
    `;
    requestAnimationFrame(()=>{
      document.getElementById('optA').classList.add('reveal');
      setTimeout(()=>document.getElementById('optB').classList.add('reveal'), 90);
    });

    const optA = document.getElementById('optA');
    const optB = document.getElementById('optB');
    applyPickedState(entry, optA, optB);
    optA.addEventListener('click', ()=>choose(entry,'a'));
    optB.addEventListener('click', ()=>choose(entry,'b'));

    updateHistoryNav();

    if(voiceOn) speak(`Would you rather be ${entry.a}? Or ${entry.b}?`);
  }

  function applyPickedState(entry, optA, optB){
    optA.classList.toggle('picked', entry.picked==='a');
    optB.classList.toggle('picked', entry.picked==='b');
    optA.classList.toggle('faded', entry.picked==='b');
    optB.classList.toggle('faded', entry.picked==='a');
    document.getElementById('tagA').textContent = entry.picked==='a' ? '✓ your pick' : '';
    document.getElementById('tagB').textContent = entry.picked==='b' ? '✓ your pick' : '';
  }

  function choose(entry, side){
    if(entry.picked) return; // one pick per dilemma
    entry.picked = side;
    applyPickedState(entry, document.getElementById('optA'), document.getElementById('optB'));
  }

  function cap(s){
    return s.charAt(0).toUpperCase()+s.slice(1);
  }

  function updateHistoryNav(){
    if(history.length>1){
      historyNav.classList.add('show');
    }
    prevBtn.disabled = cursor<=0;
    nextBtn.disabled = cursor>=history.length-1;
    historyPos.textContent = `${cursor+1} / ${history.length}`;
  }

  function roll(){
    const entry = pickDilemma();
    // trim any forward history if we'd branched off from a back-navigation
    history.splice(cursor+1);
    history.push(entry);
    cursor = history.length-1;
    render(entry);
  }

  rollBtn.addEventListener('click', roll);

  prevBtn.addEventListener('click', ()=>{
    if(cursor>0){ cursor--; render(history[cursor]); }
  });
  nextBtn.addEventListener('click', ()=>{
    if(cursor<history.length-1){ cursor++; render(history[cursor]); }
  });

  voiceToggle.addEventListener('click', ()=>{
    voiceOn = !voiceOn;
    voiceToggle.setAttribute('aria-pressed', String(voiceOn));
    voiceToggle.textContent = voiceOn ? '🔊' : '🔇';
    voicePicker.hidden = !voiceOn || voicePicker.options.length <= 1;
    if(voiceOn && history[cursor]){
      const e = history[cursor];
      speak(`Would you rather be ${e.a}? Or ${e.b}?`);
    }
  });

  function populateVoices(){
    if(!('speechSynthesis' in window)) return;
    const all = window.speechSynthesis.getVoices();
    if(!all.length) return; // not ready yet on some browsers
    let list = all.filter(v=>/^en/i.test(v.lang));
    if(!list.length) list = all;
    list.sort((a,b)=>a.name.localeCompare(b.name));

    voicePicker.innerHTML = '<option value="">Default voice</option>';
    list.forEach(v=>{
      const opt = document.createElement('option');
      opt.value = v.name;
      opt.textContent = `${v.name} (${v.lang})`;
      if(v.name === chosenVoiceName) opt.selected = true;
      voicePicker.appendChild(opt);
    });
    voicePicker.hidden = !voiceOn || list.length < 1;
  }

  voicePicker.addEventListener('change', ()=>{
    chosenVoiceName = voicePicker.value;
    localStorage.setItem('wyr-voice', chosenVoiceName);
    speak('Would you rather?');
  });

  if('speechSynthesis' in window){
    populateVoices();
    window.speechSynthesis.onvoiceschanged = populateVoices;
  }

  function speak(text){
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.98;
    u.pitch = 1.05;
    if(chosenVoiceName){
      try{
        const v = window.speechSynthesis.getVoices().find(x=>x.name===chosenVoiceName);
        if(v) u.voice = v;
      }catch(e){ /* fall back to default voice */ }
    }
    window.speechSynthesis.speak(u);
  }

})();
