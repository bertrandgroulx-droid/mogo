<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mogo — Spin the globe, find a feast</title>
<meta name="description" content="Press a button and Mogo whisks you to a random country, then serves up recipes for its most popular dishes." />
<style>
  :root {
    --bg-1: #0f2027;
    --bg-2: #203a43;
    --bg-3: #2c5364;
    --accent: #ffb703;
    --accent-2: #fb8500;
    --leaf: #80b918;
    --card: rgba(255, 255, 255, 0.07);
    --card-border: rgba(255, 255, 255, 0.15);
    --text: #f4f7f5;
    --muted: #b8c4c2;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Trebuchet MS", "Segoe UI", system-ui, sans-serif;
    color: var(--text);
    background: linear-gradient(160deg, var(--bg-1), var(--bg-2), var(--bg-3));
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  /* ---------- Logo ---------- */
  .logo {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    user-select: none;
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-8px) rotate(4deg); }
  }
  .logo-text {
    display: inline-flex;
    align-items: center;
    gap: 0.04em;
    font-size: 3.4rem;
    font-weight: 900;
    letter-spacing: 1px;
    background: linear-gradient(90deg, var(--accent), var(--leaf), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
  }
  /* Globes standing in for the two O's, each bobbing like the lead globe. */
  .logo-o {
    display: inline-block;
    font-size: 0.86em;
    /* render the emoji in full colour instead of the gradient text fill */
    -webkit-text-fill-color: initial;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.35));
    animation: bob 3s ease-in-out infinite;
  }
  .tagline {
    margin: 0.25rem 0 2rem;
    color: var(--muted);
    font-size: 1.05rem;
    text-align: center;
  }

  /* ---------- Button ---------- */
  .discover-btn {
    border: none;
    cursor: pointer;
    font-size: 1.25rem;
    font-weight: 800;
    color: #1a1a1a;
    padding: 0.95rem 2.2rem;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    box-shadow: 0 8px 24px rgba(251, 133, 0, 0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s ease;
  }
  .discover-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(251, 133, 0, 0.55); }
  .discover-btn:active { transform: translateY(0); }
  .discover-btn:disabled { cursor: not-allowed; opacity: 0.55; transform: none; box-shadow: none; }

  /* ---------- Spinning Earth + vegetables loader ---------- */
  .loader {
    margin: 2.5rem 0 1rem;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.1rem;
  }
  .loader.active { display: flex; }

  .earth-scene {
    position: relative;
    width: 140px;
    height: 140px;
  }

  /* The globe itself: a CSS sphere whose surface scrolls to look like it's spinning */
  .earth {
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background-color: #1f7ad4;
    background-image:
      radial-gradient(circle at 30% 25%, #6fd3a3 0 8%, transparent 9%),
      radial-gradient(circle at 62% 40%, #6fd3a3 0 11%, transparent 12%),
      radial-gradient(circle at 85% 70%, #57b98a 0 9%, transparent 10%),
      radial-gradient(circle at 20% 72%, #57b98a 0 12%, transparent 13%),
      radial-gradient(circle at 48% 85%, #6fd3a3 0 7%, transparent 8%),
      radial-gradient(circle at 8% 45%, #57b98a 0 6%, transparent 7%);
    background-size: 200% 100%;
    box-shadow:
      inset -14px -10px 28px rgba(0, 0, 0, 0.55),
      inset 10px 8px 22px rgba(255, 255, 255, 0.25),
      0 8px 24px rgba(0, 0, 0, 0.4);
    animation: spin-surface 3s linear infinite;
  }
  /* Glossy highlight to sell the sphere */
  .earth::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(circle at 32% 28%, rgba(255, 255, 255, 0.55), transparent 42%);
    pointer-events: none;
  }
  @keyframes spin-surface {
    from { background-position: 0% 50%; }
    to   { background-position: -200% 50%; }
  }

  /* A pack of vegetables runs in place across the top of the globe. The surface
     scrolls beneath them like a treadmill, so it reads as if their running is
     what spins the globe. They lean left, matching the surface's scroll. */
  .runners {
    position: absolute;
    top: 2px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: flex-start;
    gap: 1px;
    z-index: 2;
    pointer-events: none;
  }
  /* Arch the pack along the dome so they sit on the curved crest. */
  .runners .veg:nth-child(1) { margin-top: 12px; }
  .runners .veg:nth-child(2) { margin-top: 2px; }
  .runners .veg:nth-child(3) { margin-top: 2px; }
  .runners .veg:nth-child(4) { margin-top: 12px; }
  .veg {
    font-size: 1.3rem;
    line-height: 1;
    filter: drop-shadow(0 2px 3px rgba(0, 0, 0, 0.45));
    transform-origin: 50% 95%;
    animation: run 0.45s ease-in-out infinite;
  }
  /* A running gait: push down to "grip" the surface, then lift and lean forward. */
  @keyframes run {
    0%   { transform: translateY(1px)  rotate(-20deg); }
    50%  { transform: translateY(-7px) rotate(-2deg); }
    100% { transform: translateY(1px)  rotate(-20deg); }
  }

  .loader-text {
    color: var(--muted);
    font-size: 1.05rem;
    min-height: 1.4em;
    text-align: center;
  }

  /* ---------- Results ---------- */
  .results {
    width: 100%;
    max-width: 760px;
    margin-top: 1.5rem;
  }
  .country-banner {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .country-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
  }
  .country-center { flex: 0 1 auto; min-width: 0; }
  .nav-arrow {
    flex: 0 0 auto;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 1px solid var(--card-border);
    background: var(--card);
    color: var(--text);
    font-size: 1.9rem;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, opacity 0.15s ease;
  }
  .nav-arrow:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(255, 255, 255, 0.12);
    transform: translateY(-2px);
  }
  .nav-arrow:active:not(:disabled) { transform: none; }
  .nav-arrow:disabled { opacity: 0.25; cursor: not-allowed; }
  .country-flag { font-size: 3.5rem; line-height: 1; }
  .country-name {
    font-size: 2rem;
    font-weight: 800;
    margin: 0.3rem 0 0.1rem;
  }
  .country-name a {
    color: inherit;
    text-decoration: none;
    border-bottom: 2px dashed rgba(255, 255, 255, 0.35);
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .country-name a:hover {
    color: var(--accent);
    border-color: var(--accent);
  }
  .country-name a .map-pin { font-size: 1.3rem; margin-left: 0.3rem; }
  .country-sub { color: var(--muted); margin: 0; }
  .reset-note {
    margin: 0 auto 0.9rem;
    max-width: 520px;
    color: var(--accent);
    font-weight: 700;
    font-size: 0.95rem;
  }

  .dish-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
  }
  .dish-card {
    display: block;
    text-decoration: none;
    color: inherit;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
  }
  .dish-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 12px 26px rgba(0, 0, 0, 0.35);
  }
  .dish-thumb {
    width: 100%;
    height: 150px;
    object-fit: cover;
    display: block;
    background: #2c5364;
  }
  .dish-body { padding: 0.8rem 0.9rem 1rem; }
  .fallback-card .dish-body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: 90px;
  }
  .dish-name { font-weight: 700; font-size: 1.05rem; }
  .dish-link {
    margin-top: 0.4rem;
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 700;
  }

  .message {
    text-align: center;
    color: var(--muted);
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 1.2rem;
  }
  .message a { color: var(--accent); font-weight: 700; }

  footer {
    margin-top: auto;
    padding-top: 2.5rem;
    color: var(--muted);
    font-size: 0.8rem;
    text-align: center;
  }
  footer a { color: var(--muted); }
</style>
</head>
<body>
  <header class="logo">
    <span class="logo-text" aria-label="mogo">m<span class="logo-o" style="animation-delay: -1s">🌍</span>g<span class="logo-o" style="animation-delay: -2s">🌍</span></span>
  </header>
  <p class="tagline">Press the button. Spin the globe. Cook the world.</p>

  <button id="discoverBtn" class="discover-btn">🍽️ Surprise me with a country!</button>

  <!-- Spinning Earth with vegetables running on top -->
  <div id="loader" class="loader" aria-hidden="true">
    <div class="earth-scene">
      <div class="earth"></div>
      <div class="runners">
        <span class="veg" style="animation-delay: -0.05s">🥕</span>
        <span class="veg" style="animation-delay: -0.20s">🥦</span>
        <span class="veg" style="animation-delay: -0.32s">🍅</span>
        <span class="veg" style="animation-delay: -0.12s">🌽</span>
      </div>
    </div>
    <div id="loaderText" class="loader-text">Spinning the globe…</div>
  </div>

  <main id="results" class="results" aria-live="polite"></main>

  <footer>
    Recipes from <a href="https://www.themealdb.com" target="_blank" rel="noopener">TheMealDB</a> &amp; the web · Made with 🥗 by Mogo
  </footer>

<script>
(() => {
  "use strict";

  // Curated country database. Each country has a flag, a few iconic dishes, and —
  // where TheMealDB covers it — the matching "area" so we can pull real recipe
  // photos. Countries without an `area` (or whose API call comes up empty) fall
  // back to the curated dishes, each linking to a recipe search. This guarantees
  // every country has recipe options, not just the ~29 TheMealDB cuisines.
  const COUNTRIES = [
    // --- Covered by TheMealDB (nice photo cards when available) ---
    { country: "United States", flag: "🇺🇸", area: "American", dishes: ["Cheeseburger", "BBQ Ribs", "Mac and Cheese", "Buffalo Wings", "Apple Pie"] },
    { country: "United Kingdom", flag: "🇬🇧", area: "British", dishes: ["Fish and Chips", "Sunday Roast", "Shepherd's Pie", "Full English Breakfast", "Sticky Toffee Pudding"] },
    { country: "Canada", flag: "🇨🇦", area: "Canadian", dishes: ["Poutine", "Butter Tarts", "Tourtière", "Nanaimo Bars", "Montreal Smoked Meat"] },
    { country: "China", flag: "🇨🇳", area: "Chinese", dishes: ["Peking Duck", "Kung Pao Chicken", "Dumplings", "Mapo Tofu", "Sweet and Sour Pork"] },
    { country: "Croatia", flag: "🇭🇷", area: "Croatian", dishes: ["Black Risotto", "Peka", "Pašticada", "Štrukli", "Ćevapi"] },
    { country: "Netherlands", flag: "🇳🇱", area: "Dutch", dishes: ["Stroopwafel", "Bitterballen", "Stamppot", "Poffertjes", "Erwtensoep"] },
    { country: "Egypt", flag: "🇪🇬", area: "Egyptian", dishes: ["Koshari", "Ful Medames", "Molokhia", "Mahshi", "Ta'ameya"] },
    { country: "Philippines", flag: "🇵🇭", area: "Filipino", dishes: ["Adobo", "Sinigang", "Lechon", "Pancit", "Lumpia"] },
    { country: "France", flag: "🇫🇷", area: "French", dishes: ["Coq au Vin", "Beef Bourguignon", "Ratatouille", "Croissant", "Crème Brûlée"] },
    { country: "Greece", flag: "🇬🇷", area: "Greek", dishes: ["Moussaka", "Souvlaki", "Gyros", "Greek Salad", "Baklava"] },
    { country: "India", flag: "🇮🇳", area: "Indian", dishes: ["Butter Chicken", "Biryani", "Masala Dosa", "Chana Masala", "Samosa"] },
    { country: "Ireland", flag: "🇮🇪", area: "Irish", dishes: ["Irish Stew", "Colcannon", "Soda Bread", "Boxty", "Coddle"] },
    { country: "Italy", flag: "🇮🇹", area: "Italian", dishes: ["Pizza Margherita", "Spaghetti Carbonara", "Lasagna", "Risotto", "Tiramisu"] },
    { country: "Jamaica", flag: "🇯🇲", area: "Jamaican", dishes: ["Jerk Chicken", "Ackee and Saltfish", "Curry Goat", "Rice and Peas", "Beef Patties"] },
    { country: "Japan", flag: "🇯🇵", area: "Japanese", dishes: ["Sushi", "Ramen", "Tempura", "Tonkatsu", "Okonomiyaki"] },
    { country: "Kenya", flag: "🇰🇪", area: "Kenyan", dishes: ["Nyama Choma", "Ugali", "Sukuma Wiki", "Pilau", "Githeri"] },
    { country: "Malaysia", flag: "🇲🇾", area: "Malaysian", dishes: ["Nasi Lemak", "Char Kway Teow", "Laksa", "Satay", "Rendang"] },
    { country: "Mexico", flag: "🇲🇽", area: "Mexican", dishes: ["Tacos", "Enchiladas", "Mole Poblano", "Guacamole", "Chiles Rellenos"] },
    { country: "Morocco", flag: "🇲🇦", area: "Moroccan", dishes: ["Tagine", "Couscous", "Pastilla", "Harira", "Zaalouk"] },
    { country: "Poland", flag: "🇵🇱", area: "Polish", dishes: ["Pierogi", "Bigos", "Żurek", "Gołąbki", "Kotlet Schabowy"] },
    { country: "Portugal", flag: "🇵🇹", area: "Portuguese", dishes: ["Bacalhau à Brás", "Pastéis de Nata", "Caldo Verde", "Francesinha", "Cataplana"] },
    { country: "Russia", flag: "🇷🇺", area: "Russian", dishes: ["Borscht", "Beef Stroganoff", "Pelmeni", "Blini", "Olivier Salad"] },
    { country: "Spain", flag: "🇪🇸", area: "Spanish", dishes: ["Paella", "Tortilla Española", "Gazpacho", "Patatas Bravas", "Croquetas"] },
    { country: "Thailand", flag: "🇹🇭", area: "Thai", dishes: ["Pad Thai", "Green Curry", "Tom Yum", "Som Tam", "Mango Sticky Rice"] },
    { country: "Tunisia", flag: "🇹🇳", area: "Tunisian", dishes: ["Couscous", "Brik", "Shakshuka", "Lablabi", "Ojja"] },
    { country: "Turkey", flag: "🇹🇷", area: "Turkish", dishes: ["Kebab", "Köfte", "Meze", "Baklava", "Menemen"] },
    { country: "Ukraine", flag: "🇺🇦", area: "Ukrainian", dishes: ["Borscht", "Varenyky", "Holubtsi", "Salo", "Chicken Kyiv"] },
    { country: "Vietnam", flag: "🇻🇳", area: "Vietnamese", dishes: ["Pho", "Banh Mi", "Spring Rolls", "Bun Cha", "Com Tam"] },

    // --- Curated extras (recipe-search links for every dish) ---
    { country: "South Korea", flag: "🇰🇷", dishes: ["Kimchi", "Bibimbap", "Bulgogi", "Tteokbokki", "Korean Fried Chicken"] },
    { country: "Germany", flag: "🇩🇪", dishes: ["Schnitzel", "Bratwurst", "Sauerbraten", "Pretzel", "Black Forest Cake"] },
    { country: "Brazil", flag: "🇧🇷", dishes: ["Feijoada", "Pão de Queijo", "Moqueca", "Coxinha", "Brigadeiro"] },
    { country: "Argentina", flag: "🇦🇷", dishes: ["Asado", "Empanadas", "Milanesa", "Choripán", "Dulce de Leche"] },
    { country: "Peru", flag: "🇵🇪", dishes: ["Ceviche", "Lomo Saltado", "Ají de Gallina", "Causa", "Anticuchos"] },
    { country: "Lebanon", flag: "🇱🇧", dishes: ["Hummus", "Tabbouleh", "Kibbeh", "Manakish", "Fattoush"] },
    { country: "Iran", flag: "🇮🇷", dishes: ["Chelo Kabab", "Ghormeh Sabzi", "Fesenjan", "Tahdig", "Ash Reshteh"] },
    { country: "Indonesia", flag: "🇮🇩", dishes: ["Nasi Goreng", "Rendang", "Satay", "Gado-Gado", "Soto"] },
    { country: "Ethiopia", flag: "🇪🇹", dishes: ["Injera", "Doro Wat", "Tibs", "Kitfo", "Shiro"] },
    { country: "Nigeria", flag: "🇳🇬", dishes: ["Jollof Rice", "Egusi Soup", "Suya", "Pounded Yam", "Akara"] },
    { country: "South Africa", flag: "🇿🇦", dishes: ["Bobotie", "Bunny Chow", "Boerewors", "Biltong", "Malva Pudding"] },
    { country: "Sweden", flag: "🇸🇪", dishes: ["Swedish Meatballs", "Gravlax", "Janssons Frestelse", "Kanelbulle", "Raggmunk"] },
    { country: "Switzerland", flag: "🇨🇭", dishes: ["Cheese Fondue", "Raclette", "Rösti", "Älplermagronen", "Zürcher Geschnetzeltes"] },
    { country: "Austria", flag: "🇦🇹", dishes: ["Wiener Schnitzel", "Sachertorte", "Tafelspitz", "Apfelstrudel", "Kaiserschmarrn"] },
    { country: "Hungary", flag: "🇭🇺", dishes: ["Goulash", "Chicken Paprikash", "Lángos", "Dobos Torte", "Halászlé"] },
    { country: "Belgium", flag: "🇧🇪", dishes: ["Moules-Frites", "Belgian Waffles", "Carbonnade Flamande", "Stoofvlees", "Speculoos"] },
    { country: "Cuba", flag: "🇨🇺", dishes: ["Ropa Vieja", "Moros y Cristianos", "Cuban Sandwich", "Picadillo", "Tostones"] },
    { country: "Colombia", flag: "🇨🇴", dishes: ["Bandeja Paisa", "Arepas", "Ajiaco", "Sancocho", "Empanadas"] },
    { country: "Australia", flag: "🇦🇺", dishes: ["Meat Pie", "Barramundi", "Lamingtons", "Pavlova", "Vegemite Toast"] },
    { country: "Pakistan", flag: "🇵🇰", dishes: ["Biryani", "Nihari", "Haleem", "Seekh Kebab", "Chapli Kebab"] },
    { country: "Sri Lanka", flag: "🇱🇰", dishes: ["Rice and Curry", "Hoppers", "Kottu", "Lamprais", "Pol Sambol"] },
    { country: "Singapore", flag: "🇸🇬", dishes: ["Hainanese Chicken Rice", "Chilli Crab", "Laksa", "Char Kway Teow", "Satay"] },
    { country: "Israel", flag: "🇮🇱", dishes: ["Falafel", "Hummus", "Shakshuka", "Sabich", "Shawarma"] },
    { country: "Czech Republic", flag: "🇨🇿", dishes: ["Svíčková", "Goulash", "Trdelník", "Vepřo Knedlo Zelo", "Bramboráky"] },
    { country: "Norway", flag: "🇳🇴", dishes: ["Fårikål", "Gravlaks", "Kjøttkaker", "Lapskaus", "Brunost"] },
    { country: "Denmark", flag: "🇩🇰", dishes: ["Smørrebrød", "Frikadeller", "Æbleskiver", "Flæskesteg", "Wienerbrød"] },
  ];

  // Countries already shown this session, so the random picker never repeats one
  // until the user has seen them all.
  const seenCountries = new Set();

  // Ordered log of what's been shown this session, plus a pointer, so the user
  // can step backward/forward through their discoveries with the arrow buttons.
  // Each entry is { info, dishes } where dishes is TheMealDB meals (photo cards)
  // or an empty array (curated dish-search cards).
  const history = [];
  let historyIndex = -1;

  const LOADER_MESSAGES = [
    "Spinning the globe…",
    "Picking a country…",
    "Chopping vegetables…",
    "Simmering the menu…",
    "Plating the recipes…",
  ];

  const btn = document.getElementById("discoverBtn");
  const loader = document.getElementById("loader");
  const loaderText = document.getElementById("loaderText");
  const results = document.getElementById("results");

  let messageTimer = null;

  function startLoader() {
    results.innerHTML = "";
    loader.classList.add("active");
    loader.setAttribute("aria-hidden", "false");
    btn.disabled = true;
    let i = 0;
    loaderText.textContent = LOADER_MESSAGES[0];
    messageTimer = setInterval(() => {
      i = (i + 1) % LOADER_MESSAGES.length;
      loaderText.textContent = LOADER_MESSAGES[i];
    }, 900);
  }

  function stopLoader() {
    loader.classList.remove("active");
    loader.setAttribute("aria-hidden", "true");
    btn.disabled = false;
    clearInterval(messageTimer);
    messageTimer = null;
  }

  function pickRandom(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  async function getJSON(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error("Network error: " + res.status);
    return res.json();
  }

  // Pick a random country we haven't shown yet this session. Once every country
  // has been seen, reset and start a fresh trip around the globe.
  function pickCountry() {
    let pool = COUNTRIES.filter((c) => !seenCountries.has(c.country));
    let justReset = false;
    if (!pool.length) {
      seenCountries.clear();
      pool = COUNTRIES.slice();
      justReset = true;
    }
    const country = pickRandom(pool);
    seenCountries.add(country.country);
    return { country, justReset };
  }

  async function discover() {
    startLoader();
    // A tiny artificial floor so the delightful loader is actually seen.
    const minShow = new Promise((r) => setTimeout(r, 1400));

    const { country, justReset } = pickCountry();
    const note = justReset
      ? "🌍 You've explored every country — starting a fresh trip around the globe!"
      : "";

    let dishes = [];
    // If TheMealDB covers this country, try it for real recipe photos/links.
    if (country.area) {
      try {
        const dishData = await getJSON(
          "https://www.themealdb.com/api/json/v1/1/filter.php?a=" + encodeURIComponent(country.area)
        );
        dishes = (dishData.meals || []).slice(0, 8);
      } catch (_) {
        // API unavailable — we'll fall back to the curated dishes below.
      }
    }

    await minShow;
    stopLoader();

    // Record this discovery and jump to it.
    history.push({ info: country, dishes });
    historyIndex = history.length - 1;
    showCurrent(note);
  }

  // Render whatever entry the history pointer is on. `note` is only passed on a
  // fresh discovery (e.g. the "explored every country" message), not when paging.
  function showCurrent(note) {
    const entry = history[historyIndex];
    if (!entry) return;
    if (entry.dishes && entry.dishes.length) {
      renderResults(entry.info, entry.dishes, note);
    } else {
      renderDishLinks(entry.info, note);
    }
  }

  function goPrev() {
    if (historyIndex > 0) {
      historyIndex--;
      showCurrent();
    }
  }

  function goNext() {
    if (historyIndex < history.length - 1) {
      historyIndex++;
      showCurrent();
    }
  }

  // Optional reset note shown above the country banner.
  function noteHtml(note) {
    return note ? `<p class="reset-note">${escapeHtml(note)}</p>` : "";
  }

  // The country banner with prev/next arrows flanking the flag + name. Arrows are
  // wired/enabled separately by wireNav() after the markup is inserted.
  function bannerHtml(info, sub, note) {
    return (
      `<div class="country-banner">` +
        noteHtml(note) +
        `<div class="country-nav">` +
          `<button type="button" class="nav-arrow nav-prev" aria-label="Previous country">‹</button>` +
          `<div class="country-center">` +
            `<div class="country-flag">${info.flag}</div>` +
            countryHeading(info) +
            `<p class="country-sub">${sub}</p>` +
          `</div>` +
          `<button type="button" class="nav-arrow nav-next" aria-label="Next country">›</button>` +
        `</div>` +
      `</div>`
    );
  }

  // Hook up the arrow buttons and reflect whether each end of history is reached.
  function wireNav() {
    const prev = results.querySelector(".nav-prev");
    const next = results.querySelector(".nav-next");
    if (prev) {
      prev.disabled = historyIndex <= 0;
      prev.addEventListener("click", goPrev);
    }
    if (next) {
      next.disabled = historyIndex >= history.length - 1;
      next.addEventListener("click", goNext);
    }
  }

  // Country heading that links to the country on Google Maps.
  function countryHeading(info) {
    const mapUrl =
      "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(info.country);
    return (
      `<h2 class="country-name">` +
        `<a href="${mapUrl}" target="_blank" rel="noopener" title="See ${escapeHtml(info.country)} on Google Maps">` +
          `${escapeHtml(info.country)}<span class="map-pin" aria-hidden="true">📍</span>` +
        `</a>` +
      `</h2>`
    );
  }

  // TheMealDB photo cards linking to full recipes.
  function renderResults(info, dishes, note) {
    const cards = dishes.map((d) => {
      const recipeUrl = "https://www.themealdb.com/meal/" + encodeURIComponent(d.idMeal);
      return (
        `<a class="dish-card" href="${recipeUrl}" target="_blank" rel="noopener">` +
          `<img class="dish-thumb" src="${d.strMealThumb}" alt="${escapeHtml(d.strMeal)}" loading="lazy" />` +
          `<div class="dish-body">` +
            `<div class="dish-name">${escapeHtml(d.strMeal)}</div>` +
            `<div class="dish-link">View recipe →</div>` +
          `</div>` +
        `</a>`
      );
    }).join("");

    results.innerHTML =
      bannerHtml(info, "Most popular dishes — click any to see the full recipe", note) +
      `<div class="dish-grid">${cards}</div>`;
    wireNav();
  }

  // Curated dish cards, each linking to a recipe search for that dish.
  function renderDishLinks(info, note) {
    const cards = info.dishes.map((dish) => {
      const url = "https://www.google.com/search?q=" +
        encodeURIComponent(dish + " " + info.country + " recipe");
      return (
        `<a class="dish-card fallback-card" href="${url}" target="_blank" rel="noopener">` +
          `<div class="dish-body">` +
            `<div class="dish-name">${escapeHtml(dish)}</div>` +
            `<div class="dish-link">Find recipe →</div>` +
          `</div>` +
        `</a>`
      );
    }).join("");

    results.innerHTML =
      bannerHtml(info, "Most popular dishes — tap any to find the recipe", note) +
      `<div class="dish-grid">${cards}</div>`;
    wireNav();
  }

  function renderError(err) {
    console.error(err);
    results.innerHTML =
      `<div class="message">Hmm, the kitchen's a bit busy right now. ` +
      `Please check your connection and <a href="#" id="retryLink">try again</a>.</div>`;
    const retry = document.getElementById("retryLink");
    if (retry) retry.addEventListener("click", (e) => { e.preventDefault(); discover(); });
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[c]));
  }

  btn.addEventListener("click", discover);
})();
</script>
</body>
</html>
